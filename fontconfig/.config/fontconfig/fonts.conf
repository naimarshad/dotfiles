<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <match target="pattern">
    <edit name="dpi" mode="assign">
      <double>109</double>
    </edit>
  </match>

  <!-- ============================================
       FONT FAMILY DEFAULTS
       ============================================ -->

  <!-- Default sans-serif → Inter -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Inter</family>
    </prefer>
  </alias>

  <!-- Default sans → Inter -->
  <alias>
    <family>sans</family>
    <prefer>
      <family>Inter</family>
    </prefer>
  </alias>

  <!-- Default serif → Inter (no dedicated serif, Inter handles it cleanly) -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Inter</family>
    </prefer>
  </alias>

  <!-- Default monospace → JetBrainsMono NF Nerd Font -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrainsMono NF</family>
    </prefer>
  </alias>

  <!-- Default system-ui → Inter -->
  <alias>
    <family>system-ui</family>
    <prefer>
      <family>Inter</family>
    </prefer>
  </alias>

  <!-- ============================================
       SUBPIXEL RENDERING
       RGB layout — standard for most monitors
       including your LG Ultrawide
       ============================================ -->

  <match target="font">
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
  </match>

  <!-- LCD filter — lcddefault is the closest to macOS rendering -->
  <match target="font">
    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
  </match>

  <!-- ============================================
       HINTING
       hintslight = macOS equivalent
       sharp edges without geometric distortion
       ============================================ -->

  <match target="font">
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <match target="font">
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
  </match>

  <!-- Disable autohinter — freetype native hinter is superior -->
  <match target="font">
    <edit name="autohint" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- ============================================
       ANTIALIASING
       ============================================ -->

  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <!-- Disable embedded bitmaps — use outlines only for clean scaling -->
  <match target="font">
    <edit name="embeddedbitmap" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- ============================================
       PER-FONT OVERRIDES
       Some fonts render better with specific settings
       ============================================ -->

  <!-- Inter — slight hinting, no autohint -->
  <match target="font">
    <test name="family">
      <string>Inter</string>
    </test>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
    <edit name="autohint" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <!-- JetBrainsMono — slight hinting for crisp monospace -->
  <match target="font">
    <test name="family">
      <string>JetBrainsMono NF</string>
    </test>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
    <edit name="autohint" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <!-- Noto Sans — fallback, keep rendering consistent -->
  <match target="font">
    <test name="family">
      <string>Noto Sans</string>
    </test>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <!-- Noto Color Emoji — no hinting needed for emoji -->
  <match target="font">
    <test name="family">
      <string>Noto Color Emoji</string>
    </test>
    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <!-- ============================================
       EMOJI FALLBACK
       Ensure emoji render everywhere
       ============================================ -->

  <match target="pattern">
    <test qual="any" name="family">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="append" binding="weak">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>monospace</string>
    </test>
    <edit name="family" mode="append" binding="weak">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- ============================================
       NERD FONT SYMBOL FALLBACK
       Ensures terminal icons render correctly
       ============================================ -->

  <match target="pattern">
    <test qual="any" name="family">
      <string>monospace</string>
    </test>
    <edit name="family" mode="append" binding="weak">
      <string>JetBrainsMono NF</string>
    </edit>
  </match>

</fontconfig>
