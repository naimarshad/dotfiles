# Kubie configuration file
# Location: ~/.kube/kubie.yaml

prompt:
  # Show context name in prompt
  show_context: true
  # Show active namespace in prompt
  show_namespace: true
  # zsh: show in right-hand prompt (RPROMPT) instead of left
  zsh_use_rps1: false
  # When using recursive contexts, show depth when larger than 1.
  # Default: true
  show_depth: true

  disable: false

# Uncomment to force a specific shell
shell: zsh

# For the commands `kubie edit/edit-config`
# Possible values: Any installed text editor
# Default: unset
default_editor: nvim

# Explicitly tell kubie to use fzf
#
# Customize drop-down skim menu display options.
# Kubie uses skim as fzf-compatible Rust library for interactive menus.
fzf:
  # Enable mouse support in the selectable menu.
  # Default: true
  mouse: true

  # Reverse the layout of the menu (show prompt at top).
  # Default: false
  reverse: true

  # Enable case-insensitive search.
  # Default: false
  ignore_case: false

  # Hide the info line (match count).
  # Default: false
  info_hidden: false

  # Set the height of the menu. Can be a percentage (e.g., "50%") or a fixed
  # number of rows (e.g., "20").
  # Default: unset (uses full screen)
  height: "60%"

  # Customize the prompt string.
  # Default: unset
  prompt: "> "

  # Set a color scheme. See skim documentation for color format.
  # See more option in skim docs: https://github.com/skim-rs/skim?tab=readme-ov-file#color-scheme
  # Default: unset
 # color: "dark"
# Kubeconfig file sources — kubie reads all of these
# Respects KUBECONFIG env var automatically if set
# Configure where to look for kubernetes config files.
configs:
  # Include these globs.
  # Default: values listed below.
  include:    # 
    - "/home/naeem/projects/private/pik8s/kubeconfig"
    - "/home/naeem/projects/private/k0s/kubeconfig-sh01.yaml"
    - "/home/naeem/.kube/config"
    # Exclude these globs.
    # Default: values listed below.
    # Note: kubie's own config file is always excluded.
  exclude:
    - ~/.kube/kubie.yaml    
