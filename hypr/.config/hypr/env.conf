# ============================================================
#  ~/.config/hypr/env.conf
#  Environment variables — set BEFORE compositor initializes
#
#  Why this matters: Wayland apps need to know which toolkit
#  to use, GPU variables prevent tearing, cursor vars keep
#  your pointer consistent across all apps.
# ============================================================

# --- Wayland Backend ---
# Force apps to use Wayland natively (not XWayland fallback)
env = GDK_BACKEND,wayland,x11        # GTK apps (Firefox, Nautilus etc)
env = QT_QPA_PLATFORM,wayland;xcb    # Qt apps (Noctalia uses Qt/QML!)
env = SDL_VIDEODRIVER,wayland        # Games using SDL
env = CLUTTER_BACKEND,wayland        # GNOME-based apps

# --- Qt / Noctalia specific ---
# Noctalia is built with Qt/QML via Quickshell — these matter
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt6ct     # Lets you theme Qt apps consistently

# --- Cursor ---
# Keep cursor theme consistent — change name/size to your preference
env = XCURSOR_THEME,Bibata-Modern-Amber
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Amber
env = HYPRCURSOR_SIZE,24

# --- XDG Portals (screen sharing, file pickers) ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = GDK_SCALE,1  # Better for HiDPI

# --- GPU (uncomment the block matching your hardware) ---

# NVIDIA (modern driver 525+):
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = NVD_BACKEND,direct
# env = GBM_BACKEND,nvidia-drm

# AMD / Intel (usually works without extra vars):
# env = LIBVA_DRIVER_NAME,radeonsi  # AMD
# env = LIBVA_DRIVER_NAME,iHD       # Intel Arc / modern iGPU

# --- Electron apps (VS Code, Discord, Obsidian) ---
# Makes them use Wayland natively instead of XWayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# Java apps fix
env = _JAVA_AWT_WM_NONREPARENTING,1
env = AWT_TOOLKIT,MToolkit
