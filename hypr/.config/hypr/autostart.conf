# ============================================================
#  ~/.config/hypr/autostart.conf
#  Services and apps that launch with Hyprland
#
#  exec-once = runs ONCE per session (use for daemons/services)
#  exec       = runs EVERY time config is reloaded (avoid for daemons)
#
#  ORDER MATTERS:
#  1. Environment/DBus setup first
#  2. Polkit (auth daemon) early
#  3. Wallpaper daemon before shell
#  4. Noctalia shell last (needs other services ready)
# ============================================================

# ============================================================
#  DBus + systemd integration
#  This propagates Wayland env vars to systemd user services.
#  Required for screen sharing, portals, and service-based apps.
# ============================================================

exec-once = dbus-update-activation-environment --systemd --all 
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user start hyprland-session.target

# ============================================================
#  XDG Desktop Portal
#  Enables: screen sharing (Zoom/Meet), file pickers, color pickers
#  hyprland-specific portal handles Wayland screen capture correctly
# ============================================================

exec-once = sleep 1 && /usr/lib/xdg-desktop-portal-hyprland &
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal &

# GTK theme import
exec = /home/naeem/.config/hypr/import-gsettings.sh
# ============================================================
#  Polkit Authentication Agent
#  Needed for GUI password prompts (sudo for GUI apps,
#  mounting drives, package installs, etc.)
#  gnome-polkit is the most compatible — works with all apps
# ============================================================

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ============================================================
#  Noctalia Shell (THE MAIN EVENT)
#  Noctalia handles wallpaper, lock screen, notifications,
#  and idle management internally — no swww or hypridle needed.
#  --no-duplicate prevents a second instance on config reload.
# ============================================================

# exec-once = qs -c noctalia-shell --no-duplicate

# ============================================================
#  STEP 6: Audio (PipeWire stack)
#  Modern Arch installs this via: pacman -S pipewire pipewire-pulse wireplumber
#  Usually these are already running via systemd user services,
#  but if not — uncomment these:
# ============================================================

# exec-once = pipewire
# exec-once = pipewire-pulse
# exec-once = wireplumber

# ============================================================
#  STEP 7: Network Manager applet
#  Gives you a system tray icon for WiFi.
#  Noctalia has its own connectivity widget but nm-applet
#  provides the underlying management backend.
# ============================================================

# exec-once = nm-applet --indicator

# Power management for laptop
exec-once = powerprofilesctl set balanced
# Or for better battery life:
# exec-once = powerprofilesctl set power-saver

# ============================================================
#  OPTIONAL: Clipboard manager
#  Remembers clipboard history — very useful
#  Install: pacman -S cliphist wl-clipboard
# ============================================================

exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Bind SUPER+V to clipboard history picker (add to keybinds.conf too)
# bind = SUPER, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# ============================================================
#  OPTIONAL: Input method (only if you need CJK input)
#  exec-once = fcitx5 -d
# ============================================================

# ============================================================
#  OPTIONAL: Other apps you want on startup (e.g. seafile, discord, etc)
#  Add more exec-once lines for each app
# ============================================================
# exec-once = seafile-applet
# exec-once = arch-update --tray
