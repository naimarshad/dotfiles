# ============================================================
#  ~/.config/hypr/autostart.conf
#  Services and apps that launch with Hyprland
#
#  exec-once = runs ONCE per session (use for daemons/services)
#  exec       = runs EVERY time config is reloaded (avoid for daemons)
#
#  ORDER MATTERS:
#  1. Environment/DBus setup first
#  2. Polkit (auth daemon) early
#  3. Wallpaper daemon before shell
#  4. Noctalia shell last (needs other services ready)
# ============================================================

# ============================================================
#  DBus + systemd integration
#  This propagates Wayland env vars to systemd user services.
#  Required for screen sharing, portals, and service-based apps.
# ============================================================

exec-once = dbus-update-activation-environment --systemd --all 
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE HYPRLAND_INSTANCE_SIGNATURE
exec-once = qs -c noctalia-shell --no-duplicate

# ============================================================
#  XDG Desktop Portal
#  Enables: screen sharing (Zoom/Meet), file pickers, color pickers
#  hyprland-specific portal handles Wayland screen capture correctly
# ============================================================

exec-once = sleep 1 && /usr/lib/xdg-desktop-portal-hyprland &
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal &

# GTK theme import
exec = /home/naeem/.config/hypr/import-gsettings.sh

# Power management for laptop
exec-once = powerprofilesctl set balanced
# Or for better battery life:
# exec-once = powerprofilesctl set power-saver

# ============================================================
#  OPTIONAL: Clipboard manager
#  Remembers clipboard history — very useful
#  Install: pacman -S cliphist wl-clipboard
# ============================================================

exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = hypridle

# exec-once = slack
