# ============================================================
#  ~/.config/hypr/general.conf
#  Core tiling behavior, gaps, borders, colors
# ============================================================

general {
    # --- Gaps (space between windows and screen edges) ---
    gaps_in  = 5     # gap between two adjacent windows
    gaps_out = 12    # gap between windows and monitor edge

    # --- Borders ---
    border_size = 2

    # Border colors — using Noctalia's warm lavender palette
    # Format: rgba(RRGGBBAA)  AA = alpha (ff = fully opaque)
    col.active_border   = rgba(b4a7d6ff) rgba(8a7fc7ff) 45deg
    col.inactive_border = rgba(3a3a5caa)

    # --- Layout engine ---
    # dwindle = fibonacci-style auto-tiling (most intuitive)
    # master  = one main window + stack (classic terminal wm feel)
    layout = dwindle

    # --- Mouse behavior ---
    # Resize windows by holding SUPER and right-clicking + dragging
    resize_on_border = true

    # Prevent cursor from accidentally moving to other monitors
    no_focus_fallback = true
}

# --- Dwindle layout settings ---
dwindle {
    # Windows split in alternating H/V directions (like i3 default)
    pseudotile    = false
    preserve_split = true

    # "Smart split" — new window goes where your cursor is
    smart_split   = false
}

# --- Master layout settings (only active if layout=master above) ---
master {
    new_status      = master
    mfact           = 0.55    # master pane takes 55% of screen width
}
