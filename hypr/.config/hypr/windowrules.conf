# ============================================================
#  AUDIO MIXER — pavucontrol
# ============================================================
windowrule {
    name        = pavucontrol
    match:class = pavucontrol
    float       = on
    size        = 800 600
    center      = on
}


# ============================================================
#  POLKIT AUTH DIALOGS (password prompts)
# ============================================================
windowrule = float on,  match:class polkit-gnome-authentication-agent-1
windowrule = center on, match:class polkit-gnome-authentication-agent-1

# ============================================================
#  FILE PICKERS (Open/Save dialogs)
# ============================================================
windowrule = float on,  match:title Open File
windowrule = float on,  match:title Save As
windowrule = float on,  match:title Save File
windowrule = center on, match:title Open File
windowrule = center on, match:title Save As

# ============================================================
#  CALCULATOR
# ============================================================
windowrule = float on,  match:class org.kde.kcalc
windowrule = center on, match:class org.kde.kcalc

# ============================================================
#  ARCHIVE MANAGER
# ============================================================
windowrule = float on,  match:class xarchiver
windowrule = center on, match:class xarchiver

# ============================================================
#  TERMINALS — slight transparency so blur shows through
#  Format: opacity ACTIVE INACTIVE
# ============================================================
windowrule {
    name        = ghostty
    match:class = com.mitchellh.ghostty
    border_size = 3
    opacity      = 0.95 0.98
}

windowrule {
    name        = virt-manager
    match:class = virt-manager
    border_size = 3
    opacity     = 0.95 0.98
    workspace   = 5
}

windowrule {
    name        = All Kde
    match:class = ^(org.kde).*$
    border_size = 3
    opacity      = 0.95 0.96
}

windowrule {
    name        = thunar
    match:class = thunar
    border_size = 3
    opacity      = 0.90 0.96
}

windowrule {
    name        = Slack
    match:class = Slack
    border_size = 3
    opacity     = 0.95 0.98
    workspace   = 9
    fullscreen  = on
}

# ============================================================
#  PICTURE-IN-PICTURE (browser video popout)
# ============================================================
windowrule {
    name        = pip
    match:title = Picture-in-Picture
    float       = on
    pin         = on
    size        = 480 270
}

# ============================================================
#  WORKSPACE ASSIGNMENT
#  Uncomment and adjust to your workflow.
#  Apps launch directly into the right workspace.
# ============================================================
# windowrule = workspace 2, match:class firefox
# windowrule = workspace 3, match:class code-oss
# windowrule = workspace 4, match:class discord
# windowrule = workspace 5, match:class obsidian

# ============================================================
#  NOCTALIA LAYER RULES
#  Noctalia's bar/panels are Wayland layer surfaces —
#  they use layerrule, NOT windowrule.
#  These enable blur behind Noctalia's transparent panels.
# ============================================================
# For popups specifically (notifications, launchers etc)
# layerrule = blur on, match:namespace noctalia

# ============================================================
#  GAMES — reduce latency via immediate present (tearing)
#  Uncomment if you game on this machine.
# ============================================================
# windowrule = immediate on, match:class steam_app_.*

# Workspace - Modern syntax: windowrule = match:class ^(app)$, workspace <number>
# windowrule = match:class ^(Slack)$, workspace 9
# windowrule = fullscreen, match:class slack
windowrule = match:class ^(zen)$, workspace 1
windowrule = match:class ^(obsidian)$, workspace 1
windowrule = match:class ^(code)$, workspace 3
windowrule = match:class ^(firefox)$, workspace 4
