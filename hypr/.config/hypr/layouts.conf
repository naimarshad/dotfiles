# ============================================================
#  ~/.config/hypr/layouts.conf
#  Miscellaneous compositor settings that don't fit elsewhere
#
#  misc{} contains Hyprland behavior knobs — VRR, wallpaper,
#  focus quirks, etc.
# ============================================================

misc {
    # Disable Hyprland's built-in gradient wallpaper
    # (Noctalia/swww handles wallpaper — we don't need this)
    disable_hyprland_logo    = true
    disable_splash_rendering = true

    # --- VRR (Variable Refresh Rate / FreeSync / G-Sync) ---
    # 0 = off, 1 = always on, 2 = fullscreen only (recommended)
    vrr = 1
    vfr = true    # variable refresh rate for fullscreen apps (VRR must be enabled)

    # --- Focus behavior ---
    # When a new window opens, follow focus to it
    focus_on_activate = true

    # Don't warp cursor to newly focused window center
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true    # wake screen on keypress

    # --- Performance ---
    # Render ahead: reduces latency but can cause tearing on slow GPUs
    # render_ahead_of_time = false

    # --- Window swallowing ---
    # If you launch a GUI app from terminal, the terminal "hides" behind it
    # and comes back when you close the app. Very clean behavior.
    enable_swallow = true
    swallow_regex  = ^(kitty|ghostty|foot|alacritty)$

    # --- Hyprland IPC ---
    # Allow apps to talk to Hyprland via IPC (Noctalia uses this
    # for workspace widget and window count display)
    disable_autoreload = false
}

# --- XWayland (legacy X11 app support) ---
xwayland {
    # Scale XWayland apps to match your display scale
    # Prevents blurry X11 apps on HiDPI displays
    force_zero_scaling = true
}

# --- OpenGL settings ---
opengl {
    nvidia_anti_flicker = true    # only relevant for NVIDIA users
}
