# ============================================================
#  ~/.config/hypr/decoration.conf
#  Visual decoration — blur, shadows, rounded corners, opacity
#
#  This is where Hyprland gets its distinctive look.
#  Noctalia uses blur + transparency heavily, so these settings
#  make it look cohesive.
# ============================================================

decoration {
    # --- Rounded corners ---
    rounding = 12    # pixels — 0 = sharp, 16+ = very round

    # --- Blur (applied to transparent windows like Noctalia's bar) ---
    blur {
        enabled          = true
        size             = 30      # blur radius — higher = more blurry
        passes           = 3       # quality passes — 2-3 is the sweet spot
        new_optimizations = true   # GPU optimization, keep enabled
        xray             = false   # blur "through" windows (expensive)
        noise            = 0.20    # subtle noise texture, reduces banding
        contrast         = 1.0
        brightness       = 1.0
        ignore_opacity   = false
        popups           = true    # blur context menus and tooltips too
    }

    shadow {
        enabled        = true
        range          = 20
        render_power   = 3
    }

    # --- Window opacity ---
    # 1.0 = fully opaque. Lower values let blur show through.
    # Noctalia's bar handles its own transparency — these affect app windows
    active_opacity   = 0.92
    inactive_opacity = 0.95   # slightly fade unfocused windows

    # --- Dim inactive windows (subtle depth effect) ---
    dim_inactive   = true
    dim_strength   = 0.20    # 0.0 = off, 1.0 = fully black
}
