# ============================================================
#  ~/.config/hypr/animations.conf
#  Window and workspace animations
#
#  Hyprland's animation system uses "bezier curves" for easing.
#  Think of it like CSS transitions — you define the curve,
#  then apply it to different animation types.
#
#  Format: bezier = NAME, X1, Y1, X2, Y2  (cubic bezier)
#  Format: animation = EVENT, ENABLE, SPEED, CURVE [, STYLE]
#  Speed unit: duration in 100ms steps (10 = 1 second)
# ============================================================

animations {
    enabled = true

    # --- Define easing curves ---
    # "snap" = quick in, soft landing — great for tiling WMs
    bezier = snap,    0.19, 1.0, 0.22, 1.0

    # "smooth" = gentle ease in/out — good for opacity/blur
    bezier = smooth,  0.25, 0.1, 0.25, 1.0

    # "overshoot" = slight bounce — fun for workspace switches
    bezier = overshoot, 0.05, 0.9, 0.1, 1.05

    # "linear" = constant speed — for fade animations
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    # --- Apply curves to events ---

    # Window open/close
    animation = windows,     1, 4,  snap,      slide        # slide in from edge
    animation = windowsOut,  1, 3,  smooth,    popin 80%    # shrink/pop out

    # Window moving/resizing
    animation = windowsMove, 1, 4,  snap

    # Workspace switching (swipe left/right feel)
    animation = workspaces,  1, 5,  overshoot, slide

    # Fade (for opacity transitions)
    animation = fade,        1, 4,  smooth
    animation = fadeIn,      1, 4,  smooth
    animation = fadeOut,     1, 3,  smooth

    # Layer animations (Noctalia bar sliding in/out)
    animation = layers,      1, 3,  smooth,    slide top
    animation = layersIn,    1, 4,  snap,      slide
}
