# ============================================================
#  ~/.config/hypr/keybinds.conf
#  All keyboard shortcuts
#
#  SUPER = Windows key (also called "Mod" or "Logo" key)
#
#  Format: bind = MODIFIER, KEY, DISPATCHER, ARGUMENT
#  Common dispatchers:
#    exec          = run a command
#    killactive    = close focused window
#    workspace     = switch to workspace N
#    movetoworkspace = move window to workspace N
#    togglefloating = toggle float on window
#    fullscreen    = fullscreen (0=real, 1=maximize, 2=fullscreen no bar)
#    splitratio    = resize the split
# ============================================================

# --- MOD key alias (easier to read in config) ---
$shiftMod = SHIFT
$mod = SUPER
$term = ghostty          # change to: ghostty, foot, alacritty
$browser = zen-browser   # change to: chromium, zen-browser, etc
$filemanager = nemo  # change to: nemo, dolphin, etc
$ipc = qs -c noctalia-shell ipc call

## Noctalia Related Keybinds
bind = $mod, Space, exec, $ipc launcher toggle
bind = $mod $shiftMod, W, exec, $ipc launcher windows
bind = $mod $shiftMod, E, exec, $ipc launcher emoji
bind = $mod, B, exec, $ipc launcher clipboard
bind = $mod $shiftMod, comma, exec, $ipc settings toggle
bind = $mod, C, exec, $ipc calendar toggle
bind = $mod, T, exec, $ipc controlCenter toggle
bind = $mod, L, exec, $ipc lockScreen lock
bind = CTRL ALT, P, exec, $ipc sessionMenu toggle
bind = CTRL ALT, D, exec, $ipc notifications toggleDND


# ============================================================
#  ESSENTIAL — Learn these first
# ============================================================

# Launch terminal
bind = $mod, Return, exec, $term

# Kill focused window (like "X" button)
bind = $mod, Q, killactive

# Reload config (no restart needed — just re-reads all files)
bind = $mod SHIFT, R, exec, hyprctl reload

# ============================================================
#  WINDOW FOCUS — Move focus between tiled windows
#  Arrow keys OR vim-style hjkl (your choice)
# ============================================================

bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Vim keys (remove if you prefer arrow-only)
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# ============================================================
#  WINDOW MOVEMENT — Swap tiled window positions
# ============================================================

bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

bind = $mod SHIFT, h, swapwindow, l
bind = $mod SHIFT, l, swapwindow, r
bind = $mod SHIFT, k, swapwindow, u
bind = $mod SHIFT, j, swapwindow, d

# ============================================================
#  WINDOW RESIZE — Hold SUPER+ALT and use arrow keys
# ============================================================

binde = $mod ALT, right, resizeactive,  30 0
binde = $mod ALT, left,  resizeactive, -30 0
binde = $mod ALT, up,    resizeactive,  0 -30
binde = $mod ALT, down,  resizeactive,  0 30

# ============================================================
#  WINDOW STATES
# ============================================================

# Toggle floating (window breaks free from tiling grid)
bind = $mod, F, togglefloating

# True fullscreen (covers bar)
bind = $mod SHIFT, F, fullscreen, 0

# Maximize (respects bar/reserved space)
bind = $mod, M, fullscreen, 1

bind = $mod, P, pseudo, # dwindle

bind = $mod, J, layoutmsg, togglesplit # dwindle

# ============================================================
#  WORKSPACES — Switch and move windows
#  1-9 via number keys, 0 = workspace 10
# ============================================================

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to workspace (window follows you)
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces with mouse wheel on bar
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Previous/next workspace
bind = $mod, Tab,       workspace, e+1
bind = $mod SHIFT, Tab, workspace, e-1

# ============================================================
#  MOUSE BINDINGS
# ============================================================

# Hold SUPER + left-click = drag float window
bindm = $mod, mouse:272, movewindow

# Hold SUPER + right-click = resize float window
bindm = $mod, mouse:273, resizewindow

# ============================================================
#  APPS
# ============================================================

bind = $mod, E,        exec, $filemanager
bind = $mod SHIFT, Print,  exec, hyprshot -m region   # screenshot region
bind = $mod, Print,    exec, hyprshot -m output    # screenshot fullscreen

# ============================================================
#  NOCTALIA SPECIFIC
#  These talk to Noctalia via Quickshell IPC
# ============================================================

# Toggle control center / notification panel
bind = $mod, N, exec, $ipc controlCenter toggle

# Toggle Noctalia's music controls
bind = $mod SHIFT, P, exec, $ipc mediaControls toggle

# ============================================================
#  MEDIA KEYS (laptop function row)
# ============================================================

# Volume
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness (requires brightnessctl or light)
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media playback
bindl  = , XF86AudioPlay,  exec, playerctl play-pause
bindl  = , XF86AudioNext,  exec, playerctl next
bindl  = , XF86AudioPrev,  exec, playerctl previous

bind = $mod, period, layoutmsg, move +col
bind = $mod, comma, layoutmsg, swapcol l
