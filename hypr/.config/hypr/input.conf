# ============================================================
#  ~/.config/hypr/input.conf
#  Keyboard layout, mouse sensitivity, touchpad behavior
# ============================================================

input {
    numlock_by_default = true
    # --- Keyboard ---
    kb_layout  = us        # change to: gb, de, fr, es, etc.
    kb_variant =           # e.g: "intl" for us-international
    kb_model   =
    kb_options =           # e.g: "caps:escape" to remap CapsLock → Escape
    kb_rules   =

    # Key repeat: after holding a key this long (ms), it starts repeating
    repeat_delay = 300
    repeat_rate  = 50

    # --- Mouse ---
    # sensitivity: -1.0 (slow) to 1.0 (fast), 0 = system default
    sensitivity  = 0.0
    accel_profile = flat    # "flat" = no acceleration (preferred for precision)

    # Focus follows mouse (window gets focus when cursor enters it)
    follow_mouse = 1        # 0 = click to focus, 1 = focus on hover

    # --- Touchpad (laptop) ---
    touchpad {
        natural_scroll    = true     # macOS-style scroll direction
        tap-to-click      = true     # tap = click
        drag_lock         = false
        scroll_factor     = 0.8      # touchpad scroll speed
        clickfinger_behavior = true  # 2-finger = right click, 3-finger = middle
    }
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = logitech-usb-receiver-mouse 
    sensitivity = 0
}

# --- Gestures (touchpad swipe to switch workspaces) ---
gestures {
    # workspace_swipe         = true
    # workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert  = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true   # swipe past last workspace = new one
}
