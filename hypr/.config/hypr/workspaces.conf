# ============================================================
#  ~/.config/hypr/workspaces.conf
#  Named workspaces and persistent workspace config
#
#  By default Hyprland workspaces are just numbers.
#  You can give them names for Noctalia's workspace widget
#  and for your own sanity.
# ============================================================

# --- Named workspaces ---
# These names show up in Noctalia's workspace bar
workspace = 1,  name:term,     monitor:eDP-1
workspace = 2,  name:web,      monitor:eDP-1
workspace = 3,  name:code,     monitor:eDP-1
workspace = 4,  name:files,    monitor:eDP-1
workspace = 5,  name:chat,     monitor:eDP-1
workspace = 6,  name:media,    monitor:eDP-1
workspace = 7,  name:misc,     monitor:eDP-1
workspace = 8,  name:misc2,    monitor:eDP-1
workspace = 9,  name:Slack,    monitor:eDP-1
workspace = 10, name:bg,       monitor:eDP-1

# These names show up in Noctalia's workspace bar
# The below blocks should be disabled if external screen is not connected
# workspace = 1,  name:term,     monitor:HDMI-A-1
# workspace = 2,  name:web,      monitor:HDMI-A-1
# workspace = 3,  name:code,     monitor:HDMI-A-1
# workspace = 4,  name:files,    monitor:HDMI-A-1
# workspace = 5,  name:chat,     monitor:HDMI-A-1
# workspace = 6,  name:media,    monitor:HDMI-A-1
# workspace = 7,  name:misc,     monitor:HDMI-A-1
# workspace = 8,  name:misc2,    monitor:HDMI-A-1
# workspace = 9,  name:Slack,    monitor:eDP-1
# workspace = 10, name:bg,       monitor:HDMI-A-1

# --- Persistent workspaces ---
# "persistent:true" means the workspace exists even when empty
# Useful if you want Noctalia's bar to always show 1-5
workspace = 1,  persistent:true
workspace = 2,  persistent:true
workspace = 3,  persistent:true
workspace = 4,  persistent:true
workspace = 5,  persistent:true

# --- Special workspace (scratchpad) ---
# SUPER + S to toggle a floating scratchpad workspace
# SUPER + SHIFT + S to move window into it
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic
